  <head>
    <meta charset="UTF-8">

    <title>Home page</title>
        <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
      }

      /* Navigation Bar Styles */
      nav {
        background-color: #333;
        padding: 1rem;
        position: sticky;
        top: 0;
        z-index: 100;
      }

      nav ul {
        list-style: none;
        display: flex;
        justify-content: center;
        gap: 2rem;
      }

      nav a {
        color: white;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.3s ease;
      }

      nav a:hover {
        color: #4CAF50;
      }

      /* Toggle Button Styles */
      .toggle-btn {
        display: none;
        background-color: transparent;
        border: none;
        color: white;
        font-size: 1.5rem;
        cursor: pointer;
        padding: 0.5rem;
      }

      .toggle-btn:hover {
        color: #4CAF50;
      }

      /* Mobile Menu Styles */
      @media (max-width: 768px) {
        .toggle-btn {
          display: block;
          float: left;
        }

        nav ul {
          display: none;
          flex-direction: column;
          gap: 1rem;
          padding: 1rem 0;
          clear: both;
          width: 100%;
        }

        nav ul.active {
          display: flex;
        }

        nav ul li {
          text-align: center;
          border-bottom: 1px solid #555;
          padding: 0.5rem 0;
        }

        nav ul li:last-child {
          border-bottom: none;
        }
      }

      main {
        padding: 2rem;
        min-height: 80vh;
      }

      footer {
        background-color: #333;
        color: white;
        text-align: center;
        padding: 2rem;
        margin-top: 2rem;
      }

      footer p {
        margin: 0.5rem 0;
      }
    </style>
